name: Deploy Infrastructure with Terraform

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          role-session-name: "GitHubActions-CloudPulse"
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify Bedrock Nova Lite access
        # Sends a 1-token ping to Nova Lite. Success proves the account has
        # granted model access (a manual console step that can't be Terraformed).
        # silently show "AI insight unavailable" after a full deploy.
        run: |
          if ! aws bedrock-runtime invoke-model \
            --region us-east-1 \
            --model-id amazon.nova-lite-v1:0 \
            --body '{"messages":[{"role":"user","content":[{"text":"ping"}]}],"inferenceConfig":{"maxTokens":1}}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/bedrock-check.json 2> /tmp/bedrock-err.txt; then
            echo "::error::Cannot invoke Nova Lite in us-east-1. Most likely cause: model access was not granted in the Bedrock console. See README step 5."
            echo "AWS CLI error output:"
            cat /tmp/bedrock-err.txt
            exit 1
          fi
          echo "Nova Lite is accessible in us-east-1."

      # # --- LINTING & SECURITY (NON-BLOCKING) ---

      # - name: Install and Run TFLint
      #   continue-on-error: true
      #   run: |
      #     curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
      #     tflint --init
      #     tflint

      # - name: Install and Run tfsec
      #   continue-on-error: true
      #   run: |
      #     curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
      #     tfsec .

      # --- ACTUAL DEPLOYMENT (BLOCKING) ---

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # - name: Terraform Destroy
      #   run: terraform destroy -auto-approve

